compression: "c23"
workers: 4
train_batchSize: 32
test_batchSize: 32
frame_num:
  train: 32
  test: 5
resolution: 256
with_mask: false
with_landmark: false

# data augmentation
use_data_augmentation: false
recapture_aug_mode: "baseline"
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.0
  rotate_limit: [-10, 10]
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]

optimizer:
  type: "adam"
  adam:
    lr: 0.0002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false
  sgd:
    lr: 0.0002
    momentum: 0.9
    weight_decay: 0.0005

lr_scheduler: null
nEpochs: 10
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: "./logs"
manualSeed: 1024
save_ckpt: true
save_feat: true

loss_func: "cross_entropy"
losstype: null
metric_scoring: "auc"

cuda: true
cudnn: true
